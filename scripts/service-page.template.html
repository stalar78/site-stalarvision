<!doctype html>
<html lang="ru">

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{title}}</title>
  <link rel="canonical" href="{{canonical}}">

    content="{{description}}" />

{{jsonLd}}
